name: Android Jetpack Compose CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    # تطبيقات Compose الحديثة تحتاج إصدار جافا حديث (غالباً Java 17 أو 21)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' # تفعيل الكاش لتسريع الـ Build في المرات القادمة

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. تشغيل الفحوصات والكود لينتر (Linting & Formatting)
    - name: Run Linter (Checkstyle/Ktlint if configured)
      run: ./gradlew lintDebug

    # 2. تشغيل اختبارات الوحدة (Unit Tests)
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    # 3. بناء نسخة تجريبية (Debug APK) للتأكد أن الكود يتجمع بدون أخطاء
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 4. حفظ الـ APK الناتج كملف قابل للتحميل من جيتهاب (اختياري)
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk